# Default values for datakit-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  ## @param repository - string - required
  ## Define the repository to use:
  #
  repository: {{REPOSITORY}}

  ## @param tag - string - required
  ## Define the Cluster-Agent version to use.
  #
  tag: ""

  ## @param pullPolicy - string - optional
  ## The Kubernetes [imagePullPolicy][] value
  #
  pullPolicy: Always


imagePullSecrets: []
nameOverride: ""
fullnameOverride: "datakit-operator"

admissionregistration:
  webhooks:
    caBundle: {{CABUNDLE}}

configmap:
  jsonconfig: '
    {
        "server_listen": "0.0.0.0:9543",
        "log_level":     "info",
        "admission_inject": {
            "ddtrace": {
                "images": {
                    "java_agent_image":   "pubrepo.guance.com/datakit-operator/dd-lib-java-init:v1.8.4-guance",
                    "python_agent_image": "pubrepo.guance.com/datakit-operator/dd-lib-python-init:v1.6.2",
                    "js_agent_image":     "pubrepo.guance.com/datakit-operator/dd-lib-js-init:v3.9.2"
                },
                "envs": {
                    "DD_AGENT_HOST":           "datakit-service.datakit.svc",
                    "DD_TRACE_AGENT_PORT":     "9529",
                    "DD_JMXFETCH_STATSD_HOST": "datakit-service.datakit.svc",
                    "DD_JMXFETCH_STATSD_PORT": "8125"
                }
            },
            "logfwd": {
                "images": {
                    "logfwd_image": "pubrepo.guance.com/datakit/logfwd:1.5.8"
                }
            },
            "profiler": {
                "images": {
                    "java_profiler_image":   "pubrepo.guance.com/datakit-operator/java-profiler:v1.0.1",
                    "python_profiler_image": "pubrepo.guance.com/datakit-operator/python-profiler:v1.0.1"
                },
                "envs": {
                    "DK_AGENT_HOST":       "datakit-service.datakit.svc",
                    "DK_AGENT_PORT":       "9529",
                    "DK_PROFILE_VERSION":  "1.2.333",
                    "DK_PROFILE_ENV":      "prod",
                    "DK_PROFILE_DURATION": "240",
                    "DK_PROFILE_SCHEDULE": "*/20 * * * *"
                }
            }
        }
    }'

service:
  type: ClusterIP
  port: 443
  targetPort: 9543

env: {}

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
resources:
  limits:
     cpu: 500m
     memory: 1024Mi
  requests:
     cpu: 100m
     memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
