apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "datakit-operator.fullname" . }}-test-connection"
  labels:
    {{- include "datakit-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: pubrepo.jiagouyun.com/googleimages/busybox:1.35.0
      command: ['wget']
      args: ['{{ include "datakit-operator.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
